<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">
        <div class="logo-container">

            <div class="logo-icon">
                <span class="material-symbols-outlined">balance</span>
            </div>

            <div class="logo">
                <img src="./src/logo.webp" alt="company Logo">
            </div>

            <h2>Login Here</h2>

            <div class="divider">
                <span class="material-symbols-outlined">digital_wellbeing</span>
            </div>

            <P>Secure Portal Access for Admin and Client</P>

        </div>

        <form class="form">
            <div class="input-box">

                <label for="role">Select Role</label>

                <div class="input-field">

                    <span class="material-symbols-outlined single-icon">
                        supervisor_account
                    </span>

                    <select name="" id="role">
                        <option value="">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Client">Client</option>
                    </select>

                    <span class="material-symbols-outlined pass-icon">
expand_more
</span>
                </div>

            </div>

            <div class="input-box">

                <label for="email">email</label>

                <div class="input-field">
                    <span class="material-symbols-outlined  single-icon">mail</span>
                    <input type="email" placeholder="Ente Your Email" id="email">
                </div>

            </div>


            <div class="input-box">

                <label for="password">password</label>

                <div class="input-field">
                    <span class="material-symbols-outlined  single-icon">lock</span>
                    <input type="password" placeholder="Enter Your Password" id="password">
                    <span class="material-symbols-outlined pass-icon">visibility</span>
                </div>

            </div>


            <button class="login-btn"> <span class="material-symbols-outlined">balance</span> Login Now</button>
        </form>

        <div class="divider">
            <span class="material-symbols-outlined">digital_wellbeing</span>
        </div>

        <div class="logo-footer">
               <p>Don't have an Accout? <a href="">Sign Up</a></p>
        <a href="">forget Password?</a>
        </div>
     

    </div>
</body>

</html>
