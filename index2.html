<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <div class="login-container">

        <div class="logo-container">

            <div class="logo-icon">
                <span class="material-symbols-outlined">balance</span>
            </div>

            <div class="logo">
                <img src="./src/logo.webp" alt="company Logo">
            </div>

            <h2>Login Here</h2>

            <div class="divider">
                <span class="material-symbols-outlined">digital_wellbeing</span>
            </div>

            <p>Secure Portal Access for Admin and Client</p>

        </div>

        <form class="form">

            <div class="input-box">
                <label for="">Select Role</label>

                <div class="input-field">
                    <span class="material-symbols-outlined single-icon">
                        supervisor_account
                    </span>

                    <select name="" id="role">
                        <option value="">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Client">Client</option>
                    </select>

                    <span class="material-symbols-outlined drop-icon">
                        expand_more
                    </span>

                </div>

            </div>

            <div class="input-box">
                <label for="email">Email</label>

                <div class="input-field">
                    <span class="material-symbols-outlined  single-icon">mail</span>
                    <input type="email" placeholder="Enter Your Email" id="email">
                </div>

            </div>

            <div class="input-box">
                <label for="password">Password</label>

                <div class="input-field">
                    <span class="material-symbols-outlined  single-icon">lock</span>
                    <input type="password" id="password">
                    <span class="material-symbols-outlined pass-icon">visibility_off</span>
                </div>

            </div>

            <button class="login-btn"> <span class="material-symbols-outlined">balance</span> Login Now</button>
        </form>


        <div class="logo-footer">

            <div class="divider">
                <span class="material-symbols-outlined">digital_wellbeing</span>
            </div>

            <p>Don't Have an Account? <a href="">Sign Up</a></p>
            <a href="">Forgot Password?</a>

        </div>


    </div>

    <script>

        const form = document.querySelector(".form");

        const role = document.getElementById("role");
        const email = document.getElementById("email");
        const password = document.getElementById("password");

        const eyeIcon = document.querySelector(".pass-icon");

        /* PASSWORD SHOW / HIDE */

        eyeIcon.addEventListener("click", () => {

            if (password.type === "password") {
                password.type = "text";
                eyeIcon.textContent = "visibility";
            } else {
                password.type = "password";
                eyeIcon.textContent = "visibility_off";
            }

        });

        /* FORM VALIDATION */

        form.addEventListener("submit", (e) => {

            e.preventDefault();

            if (role.value === "") {
                alert("Please select a role.");
                return;
            }

            const emailPattern =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailPattern.test(email.value.trim())) {
                alert("Please enter a valid email address.");
                return;
            }

            if (password.value.trim().length < 6) {
                alert("Password must contain at least 6 characters.");
                return;
            }

            alert("Login Successful!");

        });

        const roleSelect = document.getElementById("role");
        const dropIcon = document.querySelector(".drop-icon");

        dropIcon.style.cursor = "pointer";

        dropIcon.addEventListener("click", () => {
            roleSelect.focus();

            const event = new MouseEvent("mousedown", {
                bubbles: true
            });

            roleSelect.dispatchEvent(event);
        });
    </script>
</body>

</html>
